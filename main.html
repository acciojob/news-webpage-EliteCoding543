<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Webpage</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background-color: #f5f5f5;
    }

    /* ================= HEADER ================= */

    .header{
      background-color: #011e29;

      color: white;

      text-align: center;

      padding: 20px;
    }

    /* ================= MAIN CONTAINER ================= */

    .container{
      display: flex;

      justify-content: center;

      gap: 20px;

      padding: 30px;

      flex-wrap: wrap;
    }

    /* ================= COMMON BOX ================= */

    .box{
      background-color: white;

      padding: 20px;

      border-radius: 10px;

      box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
    }

    /* ================= LATEST NEWS ================= */

    .latest-news-section{
      width: 250px;
    }

    .latest-news-section h3{
      margin-bottom: 15px;

      text-align: center;
    }

    .latest-news-section ul{
      padding-left: 20px;
    }

    .latest-news-section li{
      margin-bottom: 10px;
    }

    /* ================= MAIN ARTICLE ================= */

    .main-news{
      width: 400px;

      text-align: center;
    }

    .main-news img{
      width: 100%;

      border-radius: 10px;

      margin-bottom: 15px;
    }

    .main-news h2{
      margin-bottom: 10px;
    }

    .main-news p{
      color: #444;

      line-height: 24px;
    }

    /* ================= PICTORIAL NEWS ================= */

    .pictorial-news-section{
      width: 250px;

      text-align: center;
    }

    .pictorial-news-section h3{
      margin-bottom: 15px;
    }

    .pictorial-news-section img{
      width: 100%;

      border-radius: 10px;

      margin-bottom: 15px;
    }

  </style>
</head>

<body>

  <!-- ================= HEADER ================= -->

  <header class="header">

    <h1>Shaw's News</h1>

  </header>

  <!-- ================= MAIN CONTENT ================= -->

  <div class="container">

    <!-- Latest News -->

    <div class="box latest-news-section">

      <h3>Latest News Articles</h3>

      <ul>

        <li>Article 1</li>

        <li>Article 2</li>

        <li>Article 3</li>

      </ul>

    </div>

    <!-- Main News -->

    <div class="box main-news">

      <img
        src="https://images.unsplash.com/photo-1504711434969-e33886168f5c"
        alt="News Image"
      >

      <h2>Main News Heading</h2>

      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit.
        Tempora, molestiae. Lorem ipsum dolor sit amet consectetur
        adipisicing elit.
      </p>

    </div>

    <!-- Pictorial News -->

    <div class="box pictorial-news-section">

      <h3>Pictorial News</h3>

      <img
        src="https://images.unsplash.com/photo-1495020689067-958852a7765e"
        alt="News 1"
      >

      <img
        src="https://images.unsplash.com/photo-1497366754035-f200968a6e72"
        alt="News 2"
      >

      <img
        src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d"
        alt="News 3"
      >

    </div>

  </div>

</body>
</html>
